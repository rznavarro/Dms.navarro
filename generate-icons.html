<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icon Generator — DM Sequencer</title>
<style>
  body { background: #111; color: #fff; font-family: monospace; padding: 24px; max-width: 480px; margin: 0 auto; }
  h2 { color: #ff3b3b; margin-bottom: 8px; }
  p { color: #888; margin-bottom: 24px; font-size: 13px; line-height: 1.6; }
  .icon-row { display: flex; align-items: center; gap: 16px; background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  canvas { border-radius: 10px; flex-shrink: 0; }
  .icon-info { flex: 1; }
  .icon-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 2px; }
  .icon-desc { font-size: 11px; color: #666; }
  .btn-dl { background: #ff3b3b; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; }
  .btn-dl.done { background: #00aa55; }
</style>
</head>
<body>
<h2>Íconos PWA — DM Sequencer</h2>
<p>Descarga los 4 íconos y ponlos en la carpeta <strong>icons/</strong> del proyecto.</p>

<div class="icon-row">
  <canvas id="c1" width="60" height="60"></canvas>
  <div class="icon-info">
    <div class="icon-name">icon-192.png</div>
    <div class="icon-desc">192×192 — Android / Chrome</div>
  </div>
  <button class="btn-dl" onclick="dl('c1',192,false,'icon-192.png',this)">⬇ Descargar</button>
</div>

<div class="icon-row">
  <canvas id="c2" width="60" height="60"></canvas>
  <div class="icon-info">
    <div class="icon-name">icon-512.png</div>
    <div class="icon-desc">512×512 — Splash screen</div>
  </div>
  <button class="btn-dl" onclick="dl('c2',512,false,'icon-512.png',this)">⬇ Descargar</button>
</div>

<div class="icon-row">
  <canvas id="c3" width="60" height="60"></canvas>
  <div class="icon-info">
    <div class="icon-name">icon-maskable-192.png</div>
    <div class="icon-desc">192×192 — Android adaptable</div>
  </div>
  <button class="btn-dl" onclick="dl('c3',192,true,'icon-maskable-192.png',this)">⬇ Descargar</button>
</div>

<div class="icon-row">
  <canvas id="c4" width="60" height="60"></canvas>
  <div class="icon-info">
    <div class="icon-name">icon-maskable-512.png</div>
    <div class="icon-desc">512×512 — Android adaptable</div>
  </div>
  <button class="btn-dl" onclick="dl('c4',512,true,'icon-maskable-512.png',this)">⬇ Descargar</button>
</div>

<script>
function drawIcon(canvasId, size, maskable) {
  const display = document.getElementById(canvasId);
  const offscreen = document.createElement('canvas');
  offscreen.width = size;
  offscreen.height = size;
  const ctx = offscreen.getContext('2d');

  ctx.fillStyle = '#0a0a0a';
  if (!maskable) {
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillRect(0, 0, size, size);
  }

  const grd = ctx.createRadialGradient(size*0.5,size*0.42,size*0.05,size*0.5,size*0.42,size*0.40);
  grd.addColorStop(0,'rgba(255,59,59,0.25)');
  grd.addColorStop(1,'rgba(255,59,59,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(size*0.5,size*0.42,size*0.40,0,Math.PI*2);
  ctx.fill();

  ctx.font = `900 ${size*0.36}px Arial Black, Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tg = ctx.createLinearGradient(size*0.2,0,size*0.8,0);
  tg.addColorStop(0,'#ffffff');
  tg.addColorStop(1,'#ff3b3b');
  ctx.fillStyle = tg;
  ctx.fillText('DM', size*0.5, size*0.42);

  ctx.font = `700 ${size*0.10}px Arial`;
  ctx.fillStyle = '#ff3b3b';
  ctx.fillText('SEQUENCER', size*0.5, size*0.70);

  ctx.fillStyle = '#ff3b3b';
  ctx.fillRect(size*0.30, size*0.78, size*0.40, size*0.025);

  // Draw preview
  const dCtx = display.getContext('2d');
  dCtx.drawImage(offscreen, 0, 0, 60, 60);

  return offscreen.toDataURL('image/png');
}

function dl(canvasId, size, maskable, filename, btn) {
  const dataUrl = drawIcon(canvasId, size, maskable);
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  btn.textContent = '✓ Descargado';
  btn.classList.add('done');
}

// Draw previews on load
window.onload = () => {
  drawIcon('c1',192,false);
  drawIcon('c2',512,false);
  drawIcon('c3',192,true);
  drawIcon('c4',512,true);
};
</script>
</body>
</html>
